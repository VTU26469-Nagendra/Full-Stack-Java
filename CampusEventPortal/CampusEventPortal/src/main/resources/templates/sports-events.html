<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Sports Events</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#020617,#0f172a);
color:white;
padding:30px;
}

h1{
margin-bottom:30px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:25px;
border-radius:18px;
transition:0.4s;
box-shadow:0 0 20px rgba(142,45,226,0.2);
}

.card:hover{
transform:translateY(-8px) scale(1.03);
}

.card h3{
margin-bottom:10px;
}

.card p{
color:#cbd5f5;
margin-bottom:10px;
}

.btn{
padding:10px 18px;
border:none;
border-radius:8px;
background:linear-gradient(45deg,#8e2de2,#ff6ec4);
color:white;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 10px #ff6ec4;
}
</style>

</head>

<body>

<h1>Sports Events</h1>

<div class="container">

<div class="card">
<h3>🏏 Cricket Tournament</h3>
<p>Inter-college cricket match</p>
<a th:href="@{/register/cricket}">
<button class="btn">Register</button>
</a>
</div>

<div class="card">
<h3>⚽ Football Tournament</h3>
<p>Team football competition</p>
<a th:href="@{/register/football}">
<button class="btn">Register</button>
</a>
</div>

<div class="card">
<h3>♟️ Chess Competition</h3>
<p>Strategic chess battle</p>
<a th:href="@{/register/chess}">
<button class="btn">Register</button>
</a>
</div>

</div>

</body>
</html>
