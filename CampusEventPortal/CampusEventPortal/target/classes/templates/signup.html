<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Campus Events - Signup</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Body */
body{
height:100vh;
display:flex;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* Container */
.container{
display:flex;
width:100%;
}

/* LEFT SIDE */
.left{
flex:1;
padding:80px;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:42px;
font-weight:600;
line-height:1.2;
}

.left span{
background: linear-gradient(45deg,#8e2de2,#ff6ec4);
-webkit-background-clip:text;
color:transparent;
}

.left p{
margin-top:20px;
font-size:16px;
color:#cbd5f5;
max-width:400px;
}

/* RIGHT SIDE */
.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* Signup Card */
.signup-card{
background:#1e293b;
padding:30px;
border-radius:20px;
width:380px;
max-height:90vh;
overflow-y:auto;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* Title */
.signup-card h2{
text-align:center;
margin-bottom:15px;
}

/* Inputs */
input{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
font-size:14px;
}

input:focus{
outline:none;
box-shadow:0 0 8px #8e2de2;
}

/* Button */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background: linear-gradient(45deg,#8e2de2,#ff6ec4);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* Login link */
.login-link{
text-align:center;
margin-top:10px;
font-size:14px;
}

.login-link a{
color:#ff6ec4;
text-decoration:none;
font-weight:600;
}

.login-link a:hover{
text-decoration:underline;
}

/* Error */
.error{
color:#ff4d4d;
text-align:center;
margin-bottom:10px;
}

/* Responsive */
@media(max-width:900px){
.container{
flex-direction:column;
}
.left{
padding:40px;
text-align:center;
align-items:center;
}
}

</style>

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>
            Create Your <br>
            <span>Campus Account</span>
        </h1>

        <p>
            Register now to explore events, workshops, and activities happening in your campus.
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="signup-card">

            <h2>Student Signup</h2>

            <p class="error" th:text="${error}"></p>

            <form action="/signup" method="post">

                <input type="number" name="vtuNo" placeholder="VTU Number" required>

                <input type="text" name="name" placeholder="Full Name" required>

                <input type="text" name="registerNumber" placeholder="Register Number" required>

                <input type="text" name="department" placeholder="Department" required>

                <input type="number" name="year" placeholder="Year" required>

                <input type="text" name="phone" placeholder="Phone Number" required>

                <input type="email" name="vtuEmail" placeholder="VTU Email" required>

                <input type="password" name="password" placeholder="Password" required>

                <button type="submit">Signup →</button>

            </form>

            <div class="login-link">
                Already have an account?
                <a href="/login">Login</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
