<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Campus Events - Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Reset */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* Body */
body{
height:100vh;
display:flex;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

/* Container */
.container{
display:flex;
width:100%;
}

/* LEFT SIDE */
.left{
flex:1;
padding:80px;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:48px;
font-weight:600;
line-height:1.2;
}

.left span{
background: linear-gradient(45deg,#8e2de2,#ff6ec4);
-webkit-background-clip:text;
color:transparent;
}

.left p{
margin-top:20px;
font-size:16px;
color:#cbd5f5;
max-width:400px;
}

/* RIGHT SIDE */
.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* Login Card */
.login-box{
background:#1e293b;
padding:40px;
border-radius:20px;
width:350px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

/* Title */
.login-box h2{
text-align:center;
margin-bottom:20px;
}

/* Error */
.error{
color:#ff4d4d;
text-align:center;
margin-bottom:10px;
}

/* Inputs */
.input-group{
margin-bottom:18px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
font-size:14px;
}

input:focus{
outline:none;
box-shadow:0 0 8px #8e2de2;
}

/* Button */
button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background: linear-gradient(45deg,#8e2de2,#ff6ec4);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

/* Signup */
.signup-link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.signup-link a{
color:#ff6ec4;
text-decoration:none;
font-weight:600;
}

.signup-link a:hover{
text-decoration:underline;
}

/* Responsive */
@media(max-width:900px){
.container{
flex-direction:column;
}
.left{
padding:40px;
text-align:center;
align-items:center;
}
}

</style>

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>
            Discover & <br>
            Register for <span>Campus Events</span>
        </h1>

        <p>
            Join workshops, seminars, cultural fests, and more.
            Elevate your campus experience with just a few clicks.
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="login-box">

            <h2>Student Login</h2>

            <p class="error" th:text="${error}"></p>

            <form action="/login" method="post">

                <div class="input-group">
                    <input type="number" name="vtuNo" placeholder="VTU Number" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit">Login →</button>

            </form>

			<div class="signup-link">
			    Don't have an account?
			    <a href="/signup">Signup</a>
			
			    <br><br>
			
			    <a href="/admin-login" style="color:#ff6ec4; font-weight:600;">
			        Admin Login
			    </a>
			</div>
        </div>

    </div>

</div>

</body>
</html>
