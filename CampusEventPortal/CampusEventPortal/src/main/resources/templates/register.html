<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Event Registration</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(135deg,#020617,#0f172a);
}

.container{
width:850px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:40px;
border-radius:18px;
color:white;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(255,255,255,0.05);
color:white;
}

.full{
grid-column:1 / 3;
}

.btn{
margin-top:25px;
width:100%;
padding:14px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#8e2de2,#ff6ec4);
color:white;
cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Event Registration</h2>

<form th:action="@{/register}" method="post">

<div class="form-grid">

<input type="text" name="vtuNo" placeholder="VTU No" required>
<input type="text" name="name" placeholder="Student Name" required>
<input type="text" name="registerNumber" placeholder="Register Number" required>
<input type="text" name="department" placeholder="Department" required>
<input type="text" name="year" placeholder="Year" required>
<input type="text" name="phone" placeholder="Phone Number" required>

<input type="email" name="vtuEmail" placeholder="VTU Email" class="full" required>

<!-- 🔥 IMPORTANT -->
<input type="hidden" name="eventName" th:value="${registration.eventName}">

</div>

<button type="submit" class="btn">Register Now</button>

</form>

</div>

</body>
</html>
