<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Event Ticket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

/* 🔥 MATCH DASHBOARD */
body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#020617,#0f172a);
}

/* ❌ Removed Back Button Style */

/* Ticket Container */

.ticket{
width:650px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:18px;
display:flex;
overflow:hidden;
box-shadow:0 0 25px rgba(142,45,226,0.3);
animation:fadeIn 0.6s ease;
color:white;
}

/* Left Section */

.left{
width:60%;
padding:30px;
}

.left h1{
margin-bottom:15px;
}

.details p{
margin:8px 0;
font-size:15px;
}

/* Ticket ID */

.ticket-id{
margin-top:15px;
padding:8px;
background:rgba(255,255,255,0.1);
border-radius:6px;
font-weight:600;
}


/* Right Section */

.right{
width:40%;
background:linear-gradient(135deg,#8e2de2,#ff6ec4);
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
text-align:center;
}

.event-name{
font-size:20px;
font-weight:600;
margin-bottom:15px;
}

.qr img{
margin-top:10px;
}


/* Download Button */

.download-container{
position:absolute;
bottom:40px;
display:flex;
justify-content:center;
width:100%;
}

.download-btn{
padding:12px 25px;
font-size:15px;
font-weight:600;
border-radius:10px;
background:linear-gradient(45deg,#8e2de2,#ff6ec4);
color:white;
text-decoration:none;
transition:0.3s;
}

.download-btn:hover{
transform:scale(1.05);
box-shadow:0 0 10px #ff6ec4;
}


/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:scale(0.9);
}
to{
opacity:1;
transform:scale(1);
}
}

</style>
</head>

<body>

<!-- ❌ REMOVED BACK BUTTON -->

<div class="ticket">

<!-- LEFT SIDE -->

<div class="left">

<h1>🎟 Event Ticket</h1>

<div class="details">

<p><b>Name:</b> <span th:text="${registration.name}"></span></p>

<p><b>VTU No:</b> <span th:text="${registration.vtuNo}"></span></p>

<p><b>Department:</b> <span th:text="${registration.department}"></span></p>

<p><b>Year:</b> <span th:text="${registration.year}"></span></p>

<p><b>Register Number:</b> <span th:text="${registration.registerNumber}"></span></p>

</div>

<div class="ticket-id">
Ticket ID : EVT<span th:text="${registration.id}"></span>
</div>

</div>


<!-- RIGHT SIDE -->

<div class="right">

<div class="event-name" th:text="${registration.eventName}"></div>

<div class="qr">
<img th:src="'https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=EVT' + ${registration.id}">
</div>

<p style="margin-top:10px;">Show this ticket at event entry</p>

</div>

</div>


<!-- Download Button -->

<div class="download-container">

<a th:href="@{'/ticket/pdf/' + ${registration.id}}" class="download-btn">
📄 Download Ticket PDF
</a>

</div>

</body>
</html>
