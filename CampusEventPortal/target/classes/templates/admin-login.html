<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>Campus Events - Admin Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* SAME CSS (no change) */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
background: linear-gradient(135deg,#0f172a,#1e293b);
color:white;
}

.container{
display:flex;
width:100%;
}

.left{
flex:1;
padding:80px;
display:flex;
flex-direction:column;
justify-content:center;
}

.left h1{
font-size:48px;
font-weight:600;
line-height:1.2;
}

.left span{
background: linear-gradient(45deg,#8e2de2,#ff6ec4);
-webkit-background-clip:text;
color:transparent;
}

.left p{
margin-top:20px;
font-size:16px;
color:#cbd5f5;
max-width:400px;
}

.right{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:#1e293b;
padding:40px;
border-radius:20px;
width:350px;
box-shadow:0 20px 40px rgba(0,0,0,0.6);
}

.login-box h2{
text-align:center;
margin-bottom:20px;
}

.error{
color:#ff4d4d;
text-align:center;
margin-bottom:10px;
}

.input-group{
margin-bottom:18px;
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
font-size:14px;
}

input:focus{
outline:none;
box-shadow:0 0 8px #8e2de2;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:8px;
background: linear-gradient(45deg,#8e2de2,#ff6ec4);
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.4);
}

.signup-link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.signup-link a{
color:#ff6ec4;
text-decoration:none;
font-weight:600;
}

.signup-link a:hover{
text-decoration:underline;
}

@media(max-width:900px){
.container{
flex-direction:column;
}
.left{
padding:40px;
text-align:center;
align-items:center;
}
}

</style>

</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">
        <h1>
            Admin <br>
            <span>Control Panel</span>
        </h1>

        <p>
            Manage events, monitor student registrations, and control
            all campus activities from one place.
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="right">

        <div class="login-box">

            <h2>Admin Login</h2>

            <p class="error" th:if="${param.error}">
                Invalid Admin Credentials
            </p>

            <form action="/admin-login" method="post">

                <div class="input-group">
                    <input type="text" name="username" placeholder="Admin Username" required>
                </div>

                <div class="input-group">
                    <input type="password" name="password" placeholder="Password" required>
                </div>

                <button type="submit">Login →</button>

            </form>

            <div class="signup-link">
                Go back to
                <a href="/login">Student Login</a>
            </div>

        </div>

    </div>

</div>

</body>
</html>
